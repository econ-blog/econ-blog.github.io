# 포스트 태그 통제 어휘 (controlled vocabulary)
#
# `content/posts/`의 tags는 반드시 이 목록에서만 고른다. 신규 태그를 즉석에서 만들지 않는다.
# 목적은 주제군(topic group) 형성이다 — 태그가 일회성이면 같은 태그를 가진 글이 영영 모이지
# 않아, 주간 감사(Agent3)의 성과 분석이 판정할 표본을 만들 수 없고 Hugo의 관련글 매칭도 안 붙는다.
#
# 목록에 없는 주제가 나오면: 목록 안에서 가장 가까운 상위 태그를 쓴다.
# 새 태그 추가는 사람이 판단해 이 파일에 직접 append한다 — 자동 추가 금지.
# `aliases`는 그 주제를 가리키는 다른 표현이며, 태그로 쓰지 않고 매칭 판단에만 쓴다.
#
# `content/dictionary/`는 이 목록의 적용 대상이 아니다 — 항상 tags: ["용어사전"] 하나뿐이다.
# `welcome.md` 같은 공지성 글은 tags: ["공지"]로 두고 이 목록을 적용하지 않는다.

금리:
  aliases: ["기준금리", "정책금리", "대출금리", "채권", "통화정책", "코픽스"]
